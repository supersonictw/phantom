# phantom - docker-composer.yml of postgresql + redis + pgadmin, for sample only.
# (c) 2026 Shiranui (https://shiranui.xyz)

services:
  database:
    image: postgres:18-alpine
    container_name: phantom-data
    ports:
      - 127.0.0.1:2101:5432
    volumes:
      - database:/var/lib/postgresql/data
    networks:
      - phantom
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Run sh .init first to generate .env file}"
    restart: always

  cache:
    image: redis:7.2
    container_name: phantom-cache
    ports:
      - 127.0.0.1:2102:6379
    networks:
      - phantom
    restart: always

  pgadmin:
    image: dpage/pgadmin4:9.15
    container_name: phantom-pga
    ports:
      - 127.0.0.1:2103:80
    networks:
      - phantom
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL:-postgres@example.org}"
      PGADMIN_DEFAULT_PASSWORD: "${POSTGRES_PASSWORD:?Run sh .init first to generate .env file}"
      PGADMIN_CONFIG_SESSION_EXPIRATION_TIME: "${PGADMIN_CONFIG_SESSION_EXPIRATION_TIME:-365}"
      PGADMIN_CONFIG_MAX_SESSION_IDLE_TIME: "${PGADMIN_CONFIG_MAX_SESSION_IDLE_TIME:-60}"
    restart: always

volumes:
  database:
    driver: local

networks:
  phantom:
    name: phantom
    driver: bridge
